services:
  postgres:
    image: postgres:16-alpine
    container_name: civitechglobal-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-civitechglobal}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-user} -d ${POSTGRES_DB:-civitechglobal}"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./civitechglobal-server
      target: api
    container_name: civitechglobal-api
    env_file:
      - ./civitechglobal-server/.env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-user}:${POSTGRES_PASSWORD:-password}@postgres:5432/${POSTGRES_DB:-civitechglobal}?schema=public
      PORT: 5000
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "npx prisma migrate deploy && node dist/index.js"

  bot:
    build:
      context: ./civitechglobal-server
      target: bot
    container_name: civitechglobal-bot
    env_file:
      - ./civitechglobal-server/.env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-user}:${POSTGRES_PASSWORD:-password}@postgres:5432/${POSTGRES_DB:-civitechglobal}?schema=public
      TELEGRAM_BOT_PORT: 4000
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      api:
        condition: service_started

  web:
    build:
      context: ./civitechglobal-web
    container_name: civitechglobal-web
    ports:
      - "5173:80"
    depends_on:
      - api

volumes:
  postgres_data:
